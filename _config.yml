# Site
name: 'Hijaby'
description: 'A modern website for beautiful hijab styles, modest fashion inspiration, and muslimah lifestyle ideas.'
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
baseurl: '/'
disqus: 'hijabi'
email: 'admin@yourdomain.com'
mailchimp-list: 'https://www.aridjaya.com'

include: ["_pages"]
permalink: /:title/

# Plugins
plugins: 
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  
authors:
    laila:
      name:           Laila
      site:           https://www.aridjaya.com
      avatar:         assets/images/avatar1.jpg
      bio:            "Sharing inspiration about beautiful hijab styles, modest fashion trends, and muslimah outfit ideas from around the world."
      email:          admin@yourdomain.com
      twitter:        https://twitter.com/

    jane:
      name:           Jane
      site:           https://www.aridjaya.com
      avatar:         assets/images/avatar2.jpg
      bio:            "Blogger and fashion enthusiast who loves exploring modern hijab styles and modest fashion inspiration."
      email:          fakemail@gmail.com
      twitter:        https://twitter.com/
 
# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: laila
      avatar: assets/images/avatar1.jpg
      
  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page
      
# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 10



# Exclude metadata and development time dependencies (like Grunt plugins)
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]